<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Project</title>

    <link rel="stylesheet" href="App/Css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/AlertifyJS/1.13.1/css/alertify.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">E-Ticaret</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#"
                >Ana Sayfa</a
              >
            </li>
          </ul>
          <button
            class="btn btn-info fw-semibold"
            type="button"
            data-bs-toggle="modal"
            data-bs-target="#cartModal"
          >
            🛒 Sepetim
          </button>
        </div>
      </div>
    </nav>

    <div id="productSlider" class="carousel slide my-4" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src="App/img/a.jpg"
            class="d-block w-100 slider-img"
            alt="Campaign 1"
          />
        </div>
        <div class="carousel-item">
          <img
            src="App/img/b.jpg"
            class="d-block w-100 slider-img"
            alt="Campaign 2"
          />
        </div>
        <div class="carousel-item">
          <img
            src="App/img/c.jpg"
            class="d-block w-100 slider-img"
            alt="Campaign 3"
          />
        </div>
      </div>
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#productSlider"
        data-bs-slide="prev"
      >
        <span
          class="carousel-control-prev-icon custom-carousel-icon"
          aria-hidden="true"
        ></span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#productSlider"
        data-bs-slide="next"
      >
        <span
          class="carousel-control-next-icon custom-carousel-icon"
          aria-hidden="true"
        ></span>
      </button>
    </div>

    <div class="container my-5">
      <div class="row">
        <div class="col-md-3 mb-4">
          <h2 class="h4 mb-3">Kategoriler</h2>
          <ul class="list-group" id="category-list"></ul>
        </div>
        <div class="col-md-9">
          <h2 class="h4 mb-3">Ürünlerimiz</h2>
          <div class="row" id="product-list"></div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="cartModal"
      tabindex="-1"
      aria-labelledby="cartModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="cartModalLabel">Sepetim</h5>
            <button
              class="btn-close"
              type="button"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <ul id="cart-items" class="list-group mb-3"></ul>
            <p class="fs-5 fw-semibold mt-3 text-end">
              Toplam Fiyat:
              <span id="total-price" class="text-primary">0.00</span>$
            </p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline-danger" onclick="emptyCart()">
              Sepeti Boşalt
            </button>
            <button class="btn btn-primary" onclick="completedPurchase()">
              Satın Al
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="App/Js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/AlertifyJS/1.13.1/alertify.min.js"></script>
  </body>
</html>
